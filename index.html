<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双源电子 - 个人主页</title>
    <!-- 引入极简样式库，无需自己写CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.min.css">
    <style>
        /* 自定义少量样式，让页面更美观 */
        body {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .profile {
            text-align: center;
            margin-bottom: 2rem;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #eee;
        }
        .links a {
            margin: 0 0.5rem;
            text-decoration: none;
            color: #2196F3;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .section {
            margin: 2rem 0;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <!-- 个人信息头部 -->
    <div class="profile">
        <!-- 替换为你的头像链接（建议用GitHub/Gitee图床） -->
        <img src="sydz.png" alt="头像" class="avatar">
        <h1>双源电子</h1>
        <p>简介：电子DIY | 热爱编程 </p>
        <!-- 社交链接：替换为你的GitHub、邮箱、博客等 -->
        <div class="links">
            <a href="http://antbot.taobao.com/index.htm" target="_blank">店铺</a>
            <a href="584860790@qq.com" target="_blank">邮箱</a>
        </div>
    </div>

    <!-- 关于我 -->
    <div class="section">
        <h2>关于我</h2>
        <p>简单介绍自己，比如：</p>
        <p>Hello！我是一名电子DIY爱好者，擅长Arduino，喜欢用代码解决问题，目前正在学习应用ESP32系列模块。</p>
        <p>业余时间喜欢阅读、写技术博客，偶尔玩一下开源项目。</p>
    </div>

    <!-- 技能/擅长 -->
    <div class="section">
        <h2>技能清单</h2>
        <ul>
            <li>单片机stm32/51/esp32等设计</li>
            <li>嵌入式编程设计</li>
            <li>其他：篮球</li>
        </ul>
    </div>

    <!-- 项目/作品 -->
    <div class="section">
        <h2>个人项目</h2>
        <ul>
            <li><a href="https://github.com/你的用户名/项目名" target="_blank">项目1名称</a> - 简单描述：游戏机DIY</li>
            <li><a href="https://github.com/你的用户名/项目名2" target="_blank">项目2名称</a> - 简单描述：游戏机DIY</li>
        </ul>
    </div>

    <!-- 页脚 -->
    <footer style="text-align: center; margin-top: 3rem; color: #666;">
        <p>© 2026 双源电子 | 由 GitHub Pages 托管</p>
    </footer>
</body>
</html>
